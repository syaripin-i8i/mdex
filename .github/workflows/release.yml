name: Release

on:
  workflow_dispatch:

# Enable actual publishing after configuring PyPI Trusted Publisher
# for project "mdex-cli" and this workflow file.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build + verify + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies from lock
        run: |
          python -m pip install --upgrade pip
          python .github/scripts/install_from_pylock.py --lock pylock.toml --editable .

      - name: Build distribution artifacts
        run: python -m build

      - name: Validate artifacts
        run: python -m twine check dist/*

      - name: sdist install smoke
        run: |
          python -m pip install --force-reinstall dist/*.tar.gz
          mdex --help

      - name: wheel install smoke
        run: |
          python -m pip install --force-reinstall dist/*.whl
          mdex --help

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d # v1.14.0
        with:
          attestations: true
